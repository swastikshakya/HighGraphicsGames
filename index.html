<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> shakya game | High Graphics Shooter</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
  <div class="hud">
    <div class="panel">
      <span class="label">Score</span>
      <span id="score">0</span>
    </div>
    <div class="panel">
      <span class="label">Health</span>
      <span id="health">100</span>
    </div>
    <div class="panel">
      <span class="label">Wave</span>
      <span id="wave">1</span>
    </div>
    <button id="menuBtn" class="menu-btn">Menu</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="touchControls" class="touch-controls">
    <div id="movePad" class="move-pad">
      <div id="moveKnob" class="move-knob"></div>
    </div>
    <div id="fireButton" class="fire-button">FIRE</div>
  </div>

  <div id="overlay" class="overlay active">
    <div class="card">
      <h1 id="overlayTitle">Neon Havoc</h1>
      <p id="overlayMessage">Survive the cyber arena. Move with WASD or touch controls, aim with the pointer, and fire to win.</p>

      <div id="menuActions" class="menu-actions">
        <button id="startBtn" class="action-btn">Start Mission</button>
        <button id="resumeBtn" class="action-btn">Resume</button>
        <button id="stopBtn" class="action-btn">Stop</button>
        <button id="settingsBtn" class="action-btn">Settings</button>
      </div>

      <div id="settingsPanel" class="settings-panel hidden">
        <div class="setting-row">
          <span>Sound</span>
          <div class="volume-controls">
            <button id="volumeDownBtn" class="mini-btn">−</button>
            <span id="volumeValue">50%</span>
            <button id="volumeUpBtn" class="mini-btn">+</button>
          </div>
        </div>
        <button id="backBtn" class="action-btn">Back</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
